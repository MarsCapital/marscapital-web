<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mars Capital — Launching Soon</title>
  <meta name="description" content="Mars Capital is launching soon. Join the list." />

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Mars Capital" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/cursor.css">

  <style>
    :root{
      --font-main: "Montserrat", sans-serif;
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --line: rgba(255,255,255,.22);
      --glass: rgba(255,255,255,.06);
      --glass2: rgba(0,0,0,.28);
      --shadow: 0 22px 70px rgba(0,0,0,.55);
      --radius: 14px;
    }

    * { 
      box-sizing: border-box; 
      font-family: var(--font-main);
    }

    html, body { 
      height: 100%; 
      margin: 0;
    }

    body{
      color: var(--text);
      background: #05070c;
      overflow: hidden;
      font-family: var(--font-main);
    }

    h1, h2, h3, .brandline {
      font-family: var(--font-main);
    }

    /* Hero background */
    .hero{
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 56px 18px;
      background:
        radial-gradient(1200px 700px at 15% 15%, rgba(255,255,255,.08), transparent 60%),
        radial-gradient(1000px 600px at 85% 5%, rgba(255,255,255,.06), transparent 65%),
        radial-gradient(800px 500px at 80% 75%, rgba(140,180,255,.10), transparent 62%),
        linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.65)),
        url("assets/png/bg.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Stars (unchanged) */
    .stars, .stars2, .stars3{
      position: absolute;
      inset: -30%;
      background-repeat: repeat;
      pointer-events: none;
      opacity: .6;
      animation: drift 80s linear infinite;
      transform: translateZ(0);
      mix-blend-mode: screen;
    }
    /* (stars2, stars3 styles remain the same as your original) */
    .stars{ background-size:260px 260px; filter: blur(.15px); }
    .stars2{ opacity:.35; animation-duration:130s; background-size:420px 420px; filter: blur(.25px); }
    .stars3{ opacity:.20; animation-duration:180s; background-size:600px 600px; filter: blur(.35px); }

    @keyframes drift{
      from{ transform: translate3d(0,0,0); }
      to{ transform: translate3d(180px, 140px, 0); }
    }

    /* Card */
    .card{
      position: relative;
      width: min(980px, 100%);
      padding: 68px 40px 52px;     /* Much more breathing room */
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.26));
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      animation: reveal .9s ease-out forwards;
    }
    @keyframes reveal{ to{ opacity:1; transform: translateY(0); } }

    .brandline{
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
      opacity: .9;
      letter-spacing: .18em;
      font-weight: 600;
      font-size: 12px;
    }
    .brandline .dot{
      width: 6px; height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.55);
      box-shadow: 0 0 16px rgba(255,255,255,.35);
    }

    h1{
      margin: 0 0 10px;
      font-size: clamp(30px, 3.4vw, 54px);
      font-weight: 300;           /* Light weight */
      letter-spacing: 0.18em;     /* Premium look */
    }

    .subtitle{
      margin: 0 auto 42px;         /* More space below subtitle */
      max-width: 56ch;
      color: var(--muted);
      font-size: clamp(14px, 1.2vw, 16px);
      line-height: 1.6;
      letter-spacing: 0.025em;     /* Nice subtle premium spacing */
    }

    /* Form */
    .form{
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    input[type="email"]{
      width: 100%;
      padding: 16px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      color: var(--text);
      outline: none;
      font-size: 14px;
      transition: all .2s ease;
    }
    input::placeholder{ color: rgba(255,255,255,.45); }
    input:focus{
      border-color: rgba(255,255,255,.38);
      background: rgba(255,255,255,.08);
      box-shadow: 0 0 0 6px rgba(120,160,255,.10);
    }

    button{
      padding: 14px 20px;
      border-radius: var(--radius);
      border: 1px solid rgba(255,255,255,.24);
      background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
      color: var(--text);
      cursor: pointer;
      font-weight: 400;
      letter-spacing: .08em;
      transition: all .2s ease;
      min-width: 148px;
    }
    button:hover{
      border-color: rgba(255,255,255,.38);
      box-shadow: 0 16px 40px rgba(0,0,0,.35), 0 0 30px rgba(120,160,255,.14);
      transform: translateY(-1px);
    }

    .fineprint{
      margin-top: 10px;
      color: rgba(255,255,255,.55);
      font-size: 12px;
      letter-spacing: 0.03em;      /* Clean spacing for small text */
    }

    /* Social chips */
    .social{
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .chip{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.20);
      text-decoration: none;
      color: rgba(255,255,255,.85);
      font-size: 12px;
      letter-spacing: .10em;
      transition: all .2s ease;
    }
    .chip:hover{
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.24);
      transform: translateY(-1px);
    }

    /* Footer - No more all-caps */
    .footer{
      margin-top: 32px;
      opacity: .55;
      font-size: 11px;
      letter-spacing: 0.08em;        /* This adds nice spacing to copyright */
    }
    .footer a{
      color: inherit;
      text-decoration: none;
    }
    .footer a:hover{ text-decoration: underline; }

    /* Mobile */
    @media (max-width: 620px){
      .form{ grid-template-columns: 1fr; }
      button{ width: 100%; min-width: auto; }
      .card{ padding: 30px 18px 20px; }
    }
  </style>
</head>

<body>
  <main class="hero">
    <div class="stars" aria-hidden="true"></div>
    <div class="stars2" aria-hidden="true"></div>
    <div class="stars3" aria-hidden="true"></div>

    <section class="card" role="region" aria-label="Launch signup">

      <h1>MARS CAPITAL</h1>
      <p class="subtitle">
        Accelerating the future of intelligent automated wealth management.<br>
        Join the early list for launch access and private updates.
      </p>

      <form class="form" action="https://formspree.io/f/xreyzpog" method="POST" id="signupForm">
        <div class="input">
          <input type="email" name="email" placeholder="Email address" required autocomplete="email" />
        </div>
        <button type="submit">Join Newsletter</button>
      </form>

      <div class="fineprint" id="msg" aria-live="polite">
        One-click unsubscribe. Launch updates only.
      </div>

      <nav class="social" aria-label="Social links">
        <!-- your social chips remain unchanged -->
        <a class="chip" href="https://x.com/MarsCapitalX" aria-label="X.com">X</a>
        <a class="chip" href="https://www.linkedin.com/company/marscapitalx" aria-label="LinkedIn">LinkedIn</a>
        <a class="chip" href="https://www.youtube.com/@MarsCapitalX" aria-label="YouTube">YouTube</a>
      </nav>

      <div class="footer">
        © <span id="year"></span> Mars Capital by <a href="https://roycemars.com">Royce Mars</a> • All rights reserved
      </div>
    </section>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    const form = document.getElementById("signupForm");
    const msg = document.getElementById("msg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "Sending…";
      try {
        const res = await fetch(form.action, {
          method: "POST",
          body: new FormData(form),
          headers: { "Accept": "application/json" }
        });
        if (res.ok) {
          form.reset();
          msg.textContent = "You’re in. We’ll notify you at launch.";
        } else {
          msg.textContent = "Hmm — something went wrong. Try again.";
        }
      } catch {
        msg.textContent = "Network issue. Please try again.";
      }
    });
  </script>

  <script defer src="assets/js/cursor.js"></script>
</body>
</html>
